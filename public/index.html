<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Prix carburants autour de moi</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="ptrIndicator" class="ptr-indicator" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-3"/>
      </svg>
    </div>

    <header class="topbar">
      <div class="fuel-pill">
        <span aria-hidden="true">⛽</span>
        <select id="fuelSelect" aria-label="Carburant">
          <option value="Gazole">Gazole</option>
          <option value="E10">E10</option>
          <option value="SP95">SP95</option>
          <option value="SP98">SP98</option>
          <option value="E85">E85</option>
          <option value="GPLc">GPLc</option>
        </select>
      </div>
      <div class="status-pill" id="dataStatus">Chargement du flux</div>
      <button class="geo-btn" type="button" id="locateButton" aria-label="Me géolocaliser">◎</button>
    </header>

    <main class="app-shell">
      <section class="station-list" id="stationList" aria-label="Stations"></section>

      <section class="settings-panel" id="settingsPanel" hidden>
        <div class="settings-group">
          <div class="settings-row" id="tankCollapsedRow" hidden>
            <div class="settings-info">
              <div class="settings-label">Réservoir</div>
            </div>
            <div class="tank-collapsed-summary">
              <span class="tank-collapsed-val" id="tankCollapsedVal"></span>
              <button class="tank-edit-btn" id="tankEditBtn" type="button">✎ Modifier</button>
            </div>
          </div>
          <div class="settings-row" id="tankStepperRow">
            <div class="settings-info">
              <div class="settings-label">Capacité réservoir</div>
              <div class="settings-sub">Utilisé pour estimer le coût du plein sur chaque station</div>
            </div>
            <div class="stepper">
              <button class="stepper-btn" id="tankDecBtn" type="button" aria-label="Diminuer">−</button>
              <span class="stepper-val" id="tankVal">— L</span>
              <button class="stepper-btn" id="tankIncBtn" type="button" aria-label="Augmenter">+</button>
            </div>
          </div>
        </div>
        <p class="settings-hint" id="settingsHint">Par paliers de 5 L. Mis à zéro pour désactiver l'estimation.</p>

        <div class="settings-group">
          <button class="settings-row version-row" type="button" id="versionBtn">
            <div class="settings-info">
              <div class="settings-label">Version</div>
            </div>
            <div class="version-row-right">
              <span class="version-badge" id="versionBadge">—</span>
              <span class="version-chevron">›</span>
            </div>
          </button>
        </div>
      </section>

    <div class="changelog-sheet" id="changelogSheet" hidden role="dialog" aria-modal="true" aria-label="Historique des mises à jour">
      <div class="changelog-backdrop" id="changelogBackdrop"></div>
      <div class="changelog-panel">
        <div class="changelog-panel-header">
          <span class="changelog-panel-title">Historique</span>
          <button class="changelog-close" id="changelogClose" type="button" aria-label="Fermer">✕</button>
        </div>
        <ol class="changelog-list" id="changelogList" aria-label="Commits"></ol>
      </div>
    </div>
    </main>

    <nav class="tabbar" aria-label="Navigation">
      <button class="tabitem" type="button" data-view="nearby">
        <span class="tab-icon" aria-hidden="true">📍</span>
        <span>Autour</span>
      </button>
      <button class="tabitem" type="button" data-view="favorites">
        <span class="tab-icon" aria-hidden="true">★</span>
        <span>Favoris <span id="favoriteCount">0/5</span></span>
      </button>
      <button class="tabitem" type="button" id="sortTab">
        <span class="tab-icon" aria-hidden="true">↕</span>
        <span id="sortTabLabel">Trier</span>
      </button>
      <button class="tabitem" type="button" id="settingsTabBtn">
        <span class="tab-icon" aria-hidden="true">⚙</span>
        <span>Réglages</span>
      </button>
    </nav>

    <template id="stationTemplate">
      <article class="station-card">
        <div class="station-main">
          <div>
            <h2></h2>
            <p class="station-address"></p>
          </div>
          <button class="favorite-button" type="button" aria-label="Ajouter aux favoris">☆</button>
        </div>
        <div class="station-meta">
          <span class="price-chip"></span>
          <span class="distance-chip"></span>
          <span class="update-chip"></span>
        </div>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
